<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PWA Login</title>
</head>
<body>

<h2>دخول التطبيق</h2>

<input type="text" id="name" placeholder="اكتب اسمك">
<button onclick="enterApp()">دخول</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInAnonymously } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import { getFirestore, doc, setDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


// 🔥 Firebase Config (تأكد أنه نفس مشروعك)
const firebaseConfig = {
  apiKey: "AIzaSyCIXG7iliJO7r6D5yrp15vZQUSU_mECmxM",
  authDomain: "nader1-70220.firebaseapp.com",
  projectId: "nader1-70220",
  storageBucket: "nader1-70220.appspot.com",
  messagingSenderId: "67217107415",
  appId: "1:67217107415:web:c09a81ddcdeb33dfe58392"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🚀 تسجيل الدخول
window.enterApp = async function () {

  const name = document.getElementById("name").value;

  if (!name) {
    document.getElementById("status").innerText = "اكتب اسمك";
    return;
  }

  document.body.innerHTML = `<h3>جاري تسجيل الدخول...</h3>`;

  try {

    // 🔐 تسجيل Anonymous
    const userCredential = await signInAnonymously(auth);

    const uid = userCredential.user.uid;

    // 💾 حفظ في Firestore
    await setDoc(doc(db, "users", uid), {
      name: name,
      uid: uid,
      loginTime: serverTimestamp()
    });

    // 🎉 نجاح
    document.body.innerHTML = `
      <h1>مرحباً ${name} 👋</h1>
      <p>تم تسجيل الدخول بنجاح</p>
      <p>UID: ${uid}</p>
    `;

  } catch (error) {
    console.log("ERROR:", error);

    document.body.innerHTML = `
      <h2>خطأ ❌</h2>
      <p>${error.message}</p>
    `;
  }
};

</script>

</body>
</html>
